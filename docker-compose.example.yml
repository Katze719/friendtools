# Template compose file. On first setup, copy this to `docker-compose.yml`
# (or run `./bootstrap.sh`). `docker-compose.yml` is gitignored so your local
# tweaks won't conflict with `git pull` on the VPS.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-friendflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_please}
      POSTGRES_DB: ${POSTGRES_DB:-friendflow}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-friendflow} -d ${POSTGRES_DB:-friendflow}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-friendflow}:${POSTGRES_PASSWORD:-change_me_please}@db:5432/${POSTGRES_DB:-friendflow}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-168}
      BIND_ADDR: 0.0.0.0:3000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      RUST_LOG: ${RUST_LOG:-info}
      # Controls how new sign-ups are handled:
      #   approval (default) - new accounts start as "pending" and need
      #                        an admin to approve them before they can
      #                        sign in (safe default for private instances).
      #   open               - new accounts are auto-approved and can sign
      #                        in immediately after registration (good for
      #                        public / self-hosted demo instances).
      REGISTRATION_MODE: ${REGISTRATION_MODE:-approval}
      # --- Password recovery via email ---------------------------------------
      # Set SMTP_HOST to enable the "Forgot password?" link on the login
      # screen. Without it, password recovery stays fully disabled and
      # the link is hidden. APP_BASE_URL is the public URL of the
      # frontend and is baked into the reset links sent out by mail -
      # leave it blank to fall back to the first CORS_ORIGIN entry.
      APP_BASE_URL: ${APP_BASE_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_ENCRYPTION: ${SMTP_ENCRYPTION:-}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    # Reachable only inside the compose network (as `backend:3000`).
    # The frontend's nginx proxies /api/ to it; no host port exposure needed.
    expose:
      - "3000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        # "login"   -> unauthenticated visitors are sent straight to the
        #              sign-in form (default, good for private instances).
        # "landing" -> unauthenticated visitors see a public marketing
        #              page that explains what friendflow is, with
        #              sign-in / sign-up buttons in the top right.
        VITE_LANDING_MODE: ${LANDING_MODE:-login}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    # --- Production TLS (e.g. Cloudflare Origin Certificate) -----------------
    # For a public deployment with Cloudflare SSL mode "Full (strict)",
    # add the 443 mapping and uncomment the volumes below. You need BOTH
    # 80 and 443 published: Cloudflare may hit either one depending on its
    # SSL mode, and nginx.tls.conf redirects 80 -> 443.
    # Drop your origin cert into ./data/tls/origin.pem + origin.key first.
    #
    #   - "443:443"
    # volumes:
    #   - ./data/tls:/etc/nginx/tls:ro
    #   - ./frontend/nginx.tls.conf:/etc/nginx/conf.d/default.conf:ro
    # -------------------------------------------------------------------------
