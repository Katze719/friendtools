# Template compose file. On first setup, copy this to `docker-compose.yml`
# (or run `./bootstrap.sh`). `docker-compose.yml` is gitignored so your local
# tweaks won't conflict with `git pull` on the VPS.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-friendflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_please}
      POSTGRES_DB: ${POSTGRES_DB:-friendflow}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-friendflow} -d ${POSTGRES_DB:-friendflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-friendflow}:${POSTGRES_PASSWORD:-change_me_please}@db:5432/${POSTGRES_DB:-friendflow}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-168}
      BIND_ADDR: 0.0.0.0:3000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      RUST_LOG: ${RUST_LOG:-info}
    # Reachable only inside the compose network (as `backend:3000`).
    # The frontend's nginx proxies /api/ to it; no host port exposure needed.
    expose:
      - "3000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    # --- Optional: origin TLS (e.g. Cloudflare Origin Certificate) ------------
    # To terminate TLS at nginx with a Cloudflare Origin Cert (recommended
    # when Cloudflare proxies your domain and you want SSL mode "Full
    # (strict)"), uncomment the 443 port and the two volume mounts below,
    # then follow the TLS section in the README.
    #
    #   - "443:443"
    # volumes:
    #   - ./data/tls:/etc/nginx/tls:ro
    #   - ./frontend/nginx.tls.conf:/etc/nginx/conf.d/default.conf:ro
    # -------------------------------------------------------------------------
