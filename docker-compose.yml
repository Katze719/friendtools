services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-friendtools}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_please}
      POSTGRES_DB: ${POSTGRES_DB:-friendtools}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-friendtools} -d ${POSTGRES_DB:-friendtools}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-friendtools}:${POSTGRES_PASSWORD:-change_me_please}@db:5432/${POSTGRES_DB:-friendtools}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-168}
      BIND_ADDR: 0.0.0.0:3000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      RUST_LOG: ${RUST_LOG:-info}
    # Reachable only inside the compose network (as `backend:3000`).
    # The frontend's nginx proxies /api/ to it; no host port exposure needed.
    expose:
      - "3000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
